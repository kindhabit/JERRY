chroma:
  server_host: "10.0.1.10"
  server_port: 8001
  collection_name: "health_docs"
  persist_directory: "/workspace/chroma_project/data/chroma"
  chroma_api_impl: "chromadb.api.fastapi.FastAPI"

fastapi:
  server_host: "0.0.0.0"
  server_port: 3334
  log_level: "info"  # FastAPI 서버 로그 레벨

pubmed:
  timeout: 30  # 추가
  search_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi"
  fetch_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi"
  supplements:
    - "probiotics"
    - "omega-3"
    - "magnesium"
    - "green tea extract"
    - "banana leaf extract"
    - "milk thistle"
    - "red yeast rice"
  health_keywords:
    - "blood pressure"
    - "blood sugar"
    - "BMI"
    - "cholesterol"
    - "gastric endoscopy"
    - "colonoscopy polyps"
    - "liver function test"
    - "mammography"

text_analysis:
  effect_patterns:
    positive:
      - "(?:significantly|effectively)\\s+(?:improved|increased|decreased|reduced)"
      - "beneficial\\s+effect"
      - "positive\\s+outcome"
    negative:
      - "adverse\\s+effects?"
      - "side\\s+effects?"
      - "complications?"
      - "toxicity"
  dosage_pattern: "(\\d+(?:\\.\\d+)?)\\s*(?:mg|g|mcg|IU)/(?:day|daily|kg)"
  study_patterns:
    RCT: "random(ized|ised)\\s+control(led)?\\s+trial"
    meta_analysis: "meta[\\-\\s]analysis"
    cohort: "cohort\\s+study"
    case_control: "case[\\-\\s]control"
    case_series: "case\\s+series"

openai:
  models:
    embedding: "text-embedding-3-small"
    analysis:
      default: "gpt-4"
      settings:
        temperature: 0
        max_tokens: 2000
        streaming: true
        verbose: false
    extraction:
      default: "gpt-4-turbo-preview"
      settings:
        temperature: 0.3
        max_tokens: 1000
        streaming: false